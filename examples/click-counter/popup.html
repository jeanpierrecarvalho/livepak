<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 200px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
    h1 { font-size: 18px; margin: 0 0 12px; }
    #count { font-size: 32px; font-weight: bold; color: #43a047; }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #43a047;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2e7d32; }
  </style>
</head>
<body>
  <h1>Click Counter</h1>
  <div id="count">0</div>
  <button id="btn">+1</button>
  <script src="popup.js"></script>
</body>
</html>
